# Minimal example service. It is included by the root docker-compose.yml, so
# deploy it from the REPO ROOT (where .env lives):
#   docker compose up -d whoami
# Then browse to https://whoami.<your-domain>
#
# This is the whole pattern: put the container on the "edge" network and add the
# 3 traefik labels. That's all it takes for a new app to go live through the tunnel.

services:
  whoami:
    image: traefik/whoami
    container_name: whoami
    restart: unless-stopped
    networks:
      - edge
    labels:
      - traefik.enable=true
      - "traefik.http.routers.whoami.rule=Host(`whoami.${DOMAIN}`)"
      - traefik.http.routers.whoami.entrypoints=web
      - traefik.http.services.whoami.loadbalancer.server.port=80

networks:
  edge:
    external: true
