# Route the apex domain (+ www) to the Fatimah Project Mission app.
#
# Why a FILE route and not Docker labels: like prestige and theheavenlife, this
# app runs as a SEPARATE compose project on the HOST network (network_mode: host,
# port 3003) because its Postgres lives on the host's localhost:5432. It is
# therefore NOT on the `edge` network, so Traefik's docker-label discovery can't
# reach it. Instead we point a file route at the host gateway. The traefik service
# maps host.docker.internal to the host gateway (see extra_hosts in
# ../../docker-compose.yml); the app binds *:3003 on the host, so the gateway
# reaches it.
#
# NOTE: the app is not deployed yet — this route will return 502 until the
# container is up on host:3003. That is expected; the tunnel/DNS can be prepared
# in advance.
#
# NOTE: dynamic files are NOT interpolated with ${DOMAIN} — the domain is literal.

http:
  routers:
    fatimahproject:
      rule: "Host(`fatimahprojectmission.org`) || Host(`www.fatimahprojectmission.org`)"
      entryPoints:
        - web
      service: fatimahproject

  services:
    fatimahproject:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3003"
