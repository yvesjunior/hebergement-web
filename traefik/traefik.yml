# Traefik static configuration.
# TLS is terminated by Cloudflare at the edge, so internally we only serve
# plain HTTP on :80 — no certificates to manage here.

global:
  checkNewVersion: false
  sendAnonymousUsage: false

entryPoints:
  web:
    address: ":80"

providers:
  # Auto-discover services from Docker labels.
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false   # only route containers that opt in with traefik.enable=true
    network: edge             # talk to services over the shared edge network
    watch: true
  # File provider for the Traefik dashboard router + any manual routes.
  file:
    directory: /etc/traefik/dynamic
    watch: true

api:
  dashboard: true

log:
  level: INFO

accessLog: {}
